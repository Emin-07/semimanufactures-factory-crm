services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dikanish
      POSTGRES_USER: dikanish
      POSTGRES_PASSWORD: dikanish
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dikanish"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://dikanish:dikanish@db:5432/dikanish
      JWT_ACCESS_SECRET: dikanish-access-secret-change-in-prod
      JWT_REFRESH_SECRET: dikanish-refresh-secret-change-in-prod
      HOST: 0.0.0.0
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
